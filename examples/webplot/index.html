<!DOCTYPE html>
<html>

<head>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.27.0/plotly.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>

<body>
  <label for="autoReloadToggle">
    <input type="checkbox" id="autoReloadToggle" checked>
    Auto reload every 10 seconds
  </label>
  <div id="plot"></div>

  <script>
    const autoReloadToggle = document.getElementById('autoReloadToggle');
    let autoReloadInterval = null;

    autoReloadToggle.addEventListener('change', (event) => {
      if (event.target.checked) {
        autoReloadInterval = setInterval(() => {
          location.reload();
        }, 10000);
      } else if (autoReloadInterval) {
        clearInterval(autoReloadInterval);
        autoReloadInterval = null;
      }
    });

    if (autoReloadToggle.checked) {
      autoReloadInterval = setInterval(() => {
        location.reload();
      }, 10000);
    }

    // Fetch and plot CSV data
    fetch('data.csv')
      .then(response => response.text())
      .then(csvData => {
        Papa.parse(csvData, {
          header: true,
          dynamicTyping: true,
          complete: function (results) {
            const data = results.data;
            console.log('data loaded', data);


            const times = data.map(row => row.time);
            const values = data.map(row => row.measurement);

            Plotly.newPlot('plot', [{
              x: times,
              y: values,
              type: 'scatter',
              mode: 'lines+markers'
            }]);
          }
        });
      });
  </script>
</body>

</html>
